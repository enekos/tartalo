name = "Tartalo"
grammar = "tartalo"
path_suffixes = ["tt"]
line_comments = ["// "]
autoclose_before = "}])"
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
    { start = "`", end = "`", close = true, newline = false, not_in = ["string"] },
]
collaboration_sheet_value_extension_kind = "none"
